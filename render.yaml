services:
  - type: web
    name: ssg-management-web
    runtime: docker
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    preDeployCommand: php artisan migrate --force
    envVars:
      - key: APP_NAME
        value: SSG Management System
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_STACK
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: ssg-management-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: public
      - key: NGROK_AUTO_DETECT
        value: "false"
      - key: MAIL_MAILER
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_ENCRYPTION
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: SSG Management System

  - type: worker
    name: ssg-management-worker
    runtime: docker
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerCommand: php artisan queue:work --verbose --tries=3 --timeout=120 --sleep=3
    envVars:
      - key: APP_NAME
        value: SSG Management System
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: APP_KEY
      - key: APP_URL
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: APP_URL
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_STACK
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: ssg-management-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: public
      - key: NGROK_AUTO_DETECT
        value: "false"
      - key: MAIL_MAILER
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: MAIL_MAILER
      - key: MAIL_HOST
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: MAIL_HOST
      - key: MAIL_PORT
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: MAIL_PORT
      - key: MAIL_USERNAME
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: MAIL_USERNAME
      - key: MAIL_PASSWORD
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: MAIL_PASSWORD
      - key: MAIL_ENCRYPTION
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: MAIL_ENCRYPTION
      - key: MAIL_FROM_ADDRESS
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: MAIL_FROM_ADDRESS
      - key: MAIL_FROM_NAME
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: MAIL_FROM_NAME

  - type: cron
    name: ssg-management-cron
    runtime: docker
    region: singapore
    schedule: "* * * * *"
    dockerfilePath: ./Dockerfile
    dockerCommand: php artisan schedule:run
    envVars:
      - key: APP_NAME
        value: SSG Management System
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: APP_KEY
      - key: APP_URL
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: APP_URL
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_STACK
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: ssg-management-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: public
      - key: NGROK_AUTO_DETECT
        value: "false"
      - key: MAIL_MAILER
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: MAIL_MAILER
      - key: MAIL_HOST
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: MAIL_HOST
      - key: MAIL_PORT
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: MAIL_PORT
      - key: MAIL_USERNAME
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: MAIL_USERNAME
      - key: MAIL_PASSWORD
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: MAIL_PASSWORD
      - key: MAIL_ENCRYPTION
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: MAIL_ENCRYPTION
      - key: MAIL_FROM_ADDRESS
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: MAIL_FROM_ADDRESS
      - key: MAIL_FROM_NAME
        fromService:
          type: web
          name: ssg-management-web
          envVarKey: MAIL_FROM_NAME

databases:
  - name: ssg-management-db
    region: singapore

